worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    # 60–70 MP JPEGs can hit ~80 MB. Brief sets the ceiling at 200 MB.
    client_max_body_size 200M;
    client_body_timeout 600s;
    client_header_timeout 60s;

    # Gzip text assets (not images — already compressed).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker's embedded DNS so backend:8000 resolves dynamically — without this, nginx
    # caches the IP at startup and returns 502 after a `docker compose restart backend`
    # gives the backend a new IP.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80 default_server;
        server_name _;

        # API + health → FastAPI. Using a variable in proxy_pass forces nginx to re-resolve
        # DNS via the resolver above on each request rather than caching at startup.
        location /api/ {
            set $backend_host backend;
            proxy_pass http://$backend_host:8000$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;          # stream uploads through to FastAPI
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location = /health {
            set $backend_host backend;
            proxy_pass http://$backend_host:8000/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # SPA static assets — long cache for hashed filenames
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback — every other path serves index.html so React Router can resolve it
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
